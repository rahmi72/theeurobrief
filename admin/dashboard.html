<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — TheEuroBrief Admin</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='15' fill='%23B91C1C'/><text x='50' y='68' font-family='serif' font-size='55' font-weight='bold' fill='white' text-anchor='middle'>E</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { brand: { 50:'#fef2f2',100:'#fee2e2',500:'#B91C1C',600:'#991B1B' }, navy: { 400:'#829ab1',500:'#627d98',600:'#486581',700:'#334e68',800:'#243b53',900:'#102a43' } }, fontFamily: { display: ['"Playfair Display"','Georgia','serif'], body: ['"Source Sans 3"','sans-serif'] } } }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/config.js"></script>
  <script src="js/admin-auth.js"></script>
  <style>
    body { font-family: 'Source Sans 3', sans-serif; }
    .font-display { font-family: 'Playfair Display', Georgia, serif; }
    .line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
    @keyframes slideIn { from { transform: translateY(-10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  </style>
</head>
<body class="bg-gray-100 min-h-screen">

  <!-- TOP NAV -->
  <nav class="bg-navy-900 text-white sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 h-14 flex items-center justify-between">
      <div class="flex items-center gap-5">
        <a href="dashboard.html" class="flex items-center gap-2">
          <div class="w-8 h-8 bg-brand-500 rounded-lg flex items-center justify-center">
            <span class="text-white font-display font-black text-sm">E</span>
          </div>
          <span class="font-display font-bold hidden sm:inline">Admin</span>
        </a>
        <div class="flex items-center gap-1 text-sm">
          <a href="dashboard.html" class="px-3 py-1.5 rounded bg-white/10 font-medium">Dashboard</a>
          <a href="article-edit.html" class="px-3 py-1.5 rounded hover:bg-white/10 transition-colors">+ New Article</a>
        </div>
      </div>
      <div class="flex items-center gap-4">
        <span id="admin-email" class="text-xs text-navy-400 hidden sm:inline"></span>
        <button onclick="logout()" class="text-xs text-navy-400 hover:text-white transition-colors">Logout</button>
      </div>
    </div>
  </nav>

  <!-- MAIN -->
  <main class="max-w-7xl mx-auto px-4 py-6">

    <!-- Stats Cards -->
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
      <div class="bg-white rounded-xl border border-gray-200 p-5">
        <p class="text-xs font-semibold text-navy-500 uppercase tracking-wider">Total Articles</p>
        <p id="stat-total" class="font-display font-black text-3xl text-navy-900 mt-1">0</p>
      </div>
      <div class="bg-white rounded-xl border border-gray-200 p-5">
        <p class="text-xs font-semibold text-green-600 uppercase tracking-wider">Published</p>
        <p id="stat-published" class="font-display font-black text-3xl text-green-600 mt-1">0</p>
      </div>
      <div class="bg-white rounded-xl border border-gray-200 p-5">
        <p class="text-xs font-semibold text-amber-600 uppercase tracking-wider">Drafts</p>
        <p id="stat-drafts" class="font-display font-black text-3xl text-amber-600 mt-1">0</p>
      </div>
      <div class="bg-white rounded-xl border border-gray-200 p-5">
        <p class="text-xs font-semibold text-navy-500 uppercase tracking-wider">Categories</p>
        <p id="stat-categories" class="font-display font-black text-3xl text-navy-900 mt-1">0</p>
      </div>
    </div>

    <!-- Articles Section -->
    <div class="bg-white rounded-xl border border-gray-200">
      <div class="px-5 py-4 border-b border-gray-200 flex items-center justify-between">
        <h2 class="font-display font-bold text-lg text-navy-900">Articles</h2>
        <a href="article-edit.html" class="px-4 py-2 bg-brand-500 text-white text-sm font-semibold rounded-lg hover:bg-brand-600 transition-colors">+ New Article</a>
      </div>

      <!-- Filter -->
      <div class="px-5 py-3 border-b border-gray-100 flex items-center gap-3">
        <button data-filter="all" class="filter-btn text-xs font-semibold px-3 py-1.5 rounded-full bg-navy-900 text-white transition-colors">All</button>
        <button data-filter="published" class="filter-btn text-xs font-semibold px-3 py-1.5 rounded-full bg-gray-100 text-navy-600 hover:bg-gray-200 transition-colors">Published</button>
        <button data-filter="draft" class="filter-btn text-xs font-semibold px-3 py-1.5 rounded-full bg-gray-100 text-navy-600 hover:bg-gray-200 transition-colors">Drafts</button>
      </div>

      <!-- Table -->
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="bg-gray-50 text-left">
            <tr>
              <th class="px-5 py-3 font-semibold text-navy-600 text-xs uppercase tracking-wider">Title</th>
              <th class="px-5 py-3 font-semibold text-navy-600 text-xs uppercase tracking-wider hidden md:table-cell">Category</th>
              <th class="px-5 py-3 font-semibold text-navy-600 text-xs uppercase tracking-wider hidden sm:table-cell">Status</th>
              <th class="px-5 py-3 font-semibold text-navy-600 text-xs uppercase tracking-wider hidden lg:table-cell">Date</th>
              <th class="px-5 py-3 font-semibold text-navy-600 text-xs uppercase tracking-wider text-right">Actions</th>
            </tr>
          </thead>
          <tbody id="articles-tbody" class="divide-y divide-gray-100">
            <tr><td colspan="5" class="px-5 py-12 text-center text-navy-400">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>

  <script>
  (function() {
    'use strict';

    let currentFilter = 'all';
    let allArticles = [];

    async function init() {
      const session = await requireAuth();
      if (!session) return;

      document.getElementById('admin-email').textContent = session.user.email;
      await loadStats();
      await loadArticles();
    }

    async function loadStats() {
      const { count: total } = await supabaseClient.from('articles').select('*', { count: 'exact', head: true });
      const { count: published } = await supabaseClient.from('articles').select('*', { count: 'exact', head: true }).eq('is_published', true);
      const { count: drafts } = await supabaseClient.from('articles').select('*', { count: 'exact', head: true }).eq('is_published', false);
      const { count: categories } = await supabaseClient.from('categories').select('*', { count: 'exact', head: true });

      document.getElementById('stat-total').textContent = total || 0;
      document.getElementById('stat-published').textContent = published || 0;
      document.getElementById('stat-drafts').textContent = drafts || 0;
      document.getElementById('stat-categories').textContent = categories || 0;
    }

    async function loadArticles() {
      const { data, error } = await supabaseClient
        .from('articles')
        .select('*, categories(*)')
        .order('created_at', { ascending: false });

      if (error) { console.error(error); return; }
      allArticles = data || [];
      renderArticles();
    }

    function renderArticles() {
      const tbody = document.getElementById('articles-tbody');
      let filtered = allArticles;

      if (currentFilter === 'published') filtered = allArticles.filter(a => a.is_published);
      if (currentFilter === 'draft') filtered = allArticles.filter(a => !a.is_published);

      if (filtered.length === 0) {
        tbody.innerHTML = `
          <tr><td colspan="5" class="px-5 py-16 text-center">
            <div class="w-14 h-14 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-3">
              <svg class="w-7 h-7 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"/></svg>
            </div>
            <p class="font-display text-lg text-navy-700 mb-1">${currentFilter === 'all' ? 'No articles yet' : 'No ' + currentFilter + ' articles'}</p>
            <a href="article-edit.html" class="text-brand-500 text-sm font-semibold hover:text-brand-600 transition-colors">Create your first article &rarr;</a>
          </td></tr>`;
        return;
      }

      tbody.innerHTML = filtered.map(a => {
        const catName = a.categories?.name || '-';
        const statusHTML = a.is_published
          ? '<span class="inline-flex items-center gap-1 px-2 py-0.5 bg-green-50 text-green-700 text-xs font-semibold rounded-full"><span class="w-1.5 h-1.5 bg-green-500 rounded-full"></span>Published</span>'
          : '<span class="inline-flex items-center gap-1 px-2 py-0.5 bg-amber-50 text-amber-700 text-xs font-semibold rounded-full"><span class="w-1.5 h-1.5 bg-amber-500 rounded-full"></span>Draft</span>';
        const dateStr = a.published_at ? formatDateTime(a.published_at) : formatDateTime(a.created_at);
        const featuredBadge = a.is_featured ? '<span class="ml-1 text-[10px] bg-brand-50 text-brand-500 px-1.5 py-0.5 rounded font-bold">★</span>' : '';

        return `<tr class="hover:bg-gray-50 transition-colors">
          <td class="px-5 py-3">
            <a href="article-edit.html?id=${a.id}" class="font-semibold text-navy-900 hover:text-brand-500 transition-colors line-clamp-1">${a.title}</a>${featuredBadge}
            <p class="text-xs text-navy-400 mt-0.5 md:hidden">${catName}</p>
          </td>
          <td class="px-5 py-3 text-navy-600 hidden md:table-cell">${catName}</td>
          <td class="px-5 py-3 hidden sm:table-cell">${statusHTML}</td>
          <td class="px-5 py-3 text-navy-500 text-xs hidden lg:table-cell">${dateStr}</td>
          <td class="px-5 py-3 text-right">
            <div class="flex items-center justify-end gap-1">
              <a href="../article.html?slug=${a.slug}" target="_blank" class="p-1.5 text-navy-400 hover:text-blue-600 transition-colors" title="View on site">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
              </a>
              <button onclick="togglePublish('${a.id}', ${a.is_published})" class="p-1.5 text-navy-400 hover:text-green-600 transition-colors" title="${a.is_published ? 'Unpublish' : 'Publish'}">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="${a.is_published ? 'M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636' : 'M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z'}"/></svg>
              </button>
              <button onclick="deleteArticle('${a.id}', '${a.title.replace(/'/g, "\\'")}')" class="p-1.5 text-navy-400 hover:text-red-600 transition-colors" title="Delete">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
              </button>
            </div>
          </td>
        </tr>`;
      }).join('');
    }

    // Filter buttons
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.filter-btn').forEach(b => { b.classList.remove('bg-navy-900','text-white'); b.classList.add('bg-gray-100','text-navy-600'); });
        this.classList.remove('bg-gray-100','text-navy-600');
        this.classList.add('bg-navy-900','text-white');
        currentFilter = this.dataset.filter;
        renderArticles();
      });
    });

    // Toggle publish
    window.togglePublish = async function(id, currentStatus) {
      const action = currentStatus ? 'unpublish' : 'publish';
      if (!confirm(`Are you sure you want to ${action} this article?`)) return;

      const updateData = { is_published: !currentStatus };
      if (!currentStatus) {
        updateData.published_at = new Date().toISOString();
      } else {
        updateData.published_at = null;
      }

      const { error } = await supabaseClient.from('articles').update(updateData).eq('id', id);
      if (error) { showToast('Error: ' + error.message, 'error'); return; }
      showToast(`Article ${action}ed successfully`);
      await loadArticles();
      await loadStats();
    };

    // Delete
    window.deleteArticle = async function(id, title) {
      if (!confirmDelete(`Delete "${title}"?`)) return;

      // Hapus gambar dari storage jika ada
      const { data: article } = await supabaseClient.from('articles').select('featured_image').eq('id', id).single();
      if (article?.featured_image && !article.featured_image.startsWith('http')) {
        await supabaseClient.storage.from('article-images').remove([article.featured_image]).catch(() => {});
      }

      const { error } = await supabaseClient.from('articles').delete().eq('id', id);
      if (error) { showToast('Error: ' + error.message, 'error'); return; }
      showToast('Article deleted');
      await loadArticles();
      await loadStats();
    };

    if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', init); } else { init(); }
  })();
  </script>
</body>
</html>
