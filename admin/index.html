<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — TheEuroBrief</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='15' fill='%23B91C1C'/><text x='50' y='68' font-family='serif' font-size='55' font-weight='bold' fill='white' text-anchor='middle'>E</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { brand: { 500:'#B91C1C',600:'#991B1B' }, navy: { 700:'#334e68',800:'#243b53',900:'#102a43' } }, fontFamily: { display: ['"Playfair Display"','Georgia','serif'], body: ['"Source Sans 3"','sans-serif'] } } }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/config.js"></script>
  <script src="js/admin-auth.js"></script>
  <style>
    body { font-family: 'Source Sans 3', sans-serif; }
    .font-display { font-family: 'Playfair Display', Georgia, serif; }
    @keyframes slideIn { from { transform: translateY(-10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-8">
      <a href="../index.html" class="inline-flex items-center gap-2">
        <div class="w-12 h-12 bg-brand-500 rounded-xl flex items-center justify-center">
          <span class="text-white font-display font-black text-2xl">E</span>
        </div>
        <div class="text-left">
          <h1 class="font-display font-black text-2xl text-navy-900 leading-none">TheEuroBrief</h1>
          <span class="text-[10px] uppercase tracking-[0.25em] text-navy-700 font-semibold">Admin Panel</span>
        </div>
      </a>
    </div>

    <!-- Login Card -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-8">
      <h2 class="font-display font-bold text-xl text-navy-900 mb-1">Sign In</h2>
      <p class="text-sm text-gray-500 mb-6">Enter your credentials to access the admin panel</p>

      <form id="login-form" class="space-y-4">
        <div>
          <label class="block text-sm font-semibold text-navy-800 mb-1.5">Email</label>
          <input type="email" id="login-email" required autocomplete="email"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500/30 focus:border-brand-500 transition text-sm"
            placeholder="your@email.com">
        </div>
        <div>
          <label class="block text-sm font-semibold text-navy-800 mb-1.5">Password</label>
          <input type="password" id="login-password" required autocomplete="current-password"
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500/30 focus:border-brand-500 transition text-sm"
            placeholder="••••••••">
        </div>

        <div id="login-error" class="hidden text-sm text-red-600 bg-red-50 border border-red-200 rounded-lg px-4 py-2.5"></div>

        <button type="submit" id="login-btn"
          class="w-full py-2.5 bg-brand-500 text-white font-semibold rounded-lg hover:bg-brand-600 transition-colors text-sm disabled:opacity-50 disabled:cursor-not-allowed">
          Sign In
        </button>
      </form>
    </div>

    <p class="text-center text-xs text-gray-400 mt-6">
      <a href="../index.html" class="hover:text-brand-500 transition-colors">&larr; Back to website</a>
    </p>
  </div>

  <script>
  (function() {
    'use strict';

    // Kalau sudah login, langsung redirect
    supabaseClient.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = 'dashboard.html';
    });

    document.getElementById('login-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      const errorEl = document.getElementById('login-error');
      const btn = document.getElementById('login-btn');

      errorEl.classList.add('hidden');
      btn.disabled = true;
      btn.textContent = 'Signing in...';

      const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });

      if (error) {
        errorEl.textContent = error.message === 'Invalid login credentials'
          ? 'Invalid email or password. Please try again.'
          : error.message;
        errorEl.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Sign In';
        return;
      }

      window.location.href = 'dashboard.html';
    });
  })();
  </script>
</body>
</html>
