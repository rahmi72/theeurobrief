<html lang="en">
<head>

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='15' fill='%23B91C1C'/><text x='50' y='68' font-family='serif' font-size='55' font-weight='bold' fill='white' text-anchor='middle'>E</text></svg>">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50:'#fef2f2',100:'#fee2e2',200:'#fecaca',500:'#B91C1C',600:'#991B1B',700:'#7F1D1D',800:'#6B1616',900:'#4C0E0E' },
            navy: { 50:'#f0f4f8',100:'#d9e2ec',200:'#bcccdc',300:'#9fb3c8',400:'#829ab1',500:'#627d98',600:'#486581',700:'#334e68',800:'#243b53',900:'#102a43' }
          },
          fontFamily: {
            display: ['"Playfair Display"', 'Georgia', 'serif'],
            body: ['"Source Sans 3"', 'Helvetica', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <style>
    body { font-family: 'Source Sans 3', sans-serif; }
    .font-display { font-family: 'Playfair Display', Georgia, serif; }
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    .skeleton { background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%); background-size: 200% 100%; animation: shimmer 1.5s ease-in-out infinite; }
    html { scroll-behavior: smooth; }
    .nav-link { position: relative; }
    .nav-link::after { content: ''; position: absolute; bottom: -2px; left: 0; width: 0; height: 2px; background: #B91C1C; transition: width 0.3s ease; }
    .nav-link:hover::after { width: 100%; }
  </style>
</head>
<body class="bg-gray-50 text-navy-900 font-body antialiased">

  <!-- TOP BAR -->
  <div class="bg-navy-900 text-white text-xs">
    <div class="max-w-7xl mx-auto px-4 py-2 flex items-center justify-between">
      <span id="current-date" class="hidden sm:block"></span>
      <div class="flex items-center gap-4">
        <a href="about.html" class="hover:text-brand-100 transition-colors">About</a>
        <a href="search.html" class="hover:text-brand-100 transition-colors">Search</a>
      </div>
    </div>
  </div>

  <!-- HEADER -->
  <header class="bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
      <a href="index.html" class="flex items-center gap-2">
        <div class="w-10 h-10 bg-brand-500 rounded-lg flex items-center justify-center"><span class="text-white font-display font-black text-xl">E</span></div>
        <div>
          <h1 class="font-display font-black text-2xl md:text-3xl text-navy-900 leading-none tracking-tight">TheEuroBrief</h1>
          <span class="text-[10px] uppercase tracking-[0.25em] text-navy-500 font-semibold hidden sm:block">Your Window into Europe</span>
        </div>
      </a>
      <div class="hidden md:flex items-center gap-3">
        <form action="search.html" method="GET" class="relative">
          <input type="text" name="q" placeholder="Search articles..." class="w-56 lg:w-72 pl-10 pr-4 py-2 text-sm border border-gray-300 rounded-full bg-gray-50 focus:outline-none focus:ring-2 focus:ring-brand-500/30 focus:border-brand-500 transition">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        </form>
      </div>
      <button id="mobile-menu-btn" class="md:hidden p-2 rounded-lg hover:bg-gray-100 transition" aria-label="Open menu">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
    </div>
    <nav class="border-t border-gray-100 bg-gray-50/80 hidden md:block">
      <div class="max-w-7xl mx-auto px-4">
        <div id="nav-categories" class="flex items-center gap-1 overflow-x-auto py-0 scrollbar-hide text-sm">
          <a href="index.html" class="nav-link px-3 py-3 font-medium text-navy-600 hover:text-brand-500 whitespace-nowrap transition-colors">Home</a>
        </div>
      </div>
    </nav>
    <div id="mobile-menu" class="md:hidden hidden border-t border-gray-100 bg-white">
      <div class="px-4 py-3">
        <form action="search.html" method="GET" class="relative mb-3">
          <input type="text" name="q" placeholder="Search articles..." class="w-full pl-10 pr-4 py-2.5 text-sm border border-gray-300 rounded-lg bg-gray-50 focus:outline-none focus:ring-2 focus:ring-brand-500/30 focus:border-brand-500">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        </form>
        <div id="mobile-nav-categories" class="flex flex-col gap-1">
          <a href="index.html" class="px-3 py-2 rounded-lg font-medium text-navy-600 hover:bg-gray-100 transition-colors">Home</a>
        </div>
      </div>
    </div>
  </header>

  <!-- MAIN -->
  <main class="max-w-7xl mx-auto px-4 py-8">
    <!-- Breadcrumb -->
    <nav class="flex items-center gap-2 text-xs text-navy-400 mb-6">
      <a href="index.html" class="hover:text-brand-500 transition-colors">Home</a>
      <span class="text-navy-300">/</span>
      <span id="breadcrumb-current" class="skeleton w-32 h-3 rounded inline-block"></span>
    </nav>

    <!-- Category Header -->
    <div id="category-header" class="mb-8">
      <div class="skeleton h-10 w-64 rounded mb-2"></div>
      <div class="skeleton h-5 w-96 max-w-full rounded"></div>
    </div>

    <!-- Category Filter Tabs -->
    <div id="category-tabs" class="flex items-center gap-2 overflow-x-auto pb-4 mb-6 scrollbar-hide border-b border-gray-200">
      <!-- Diisi oleh JS -->
    </div>

    <!-- Articles Grid -->
    <div id="articles-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5 mb-8">
      <div class="skeleton rounded-xl aspect-[16/10]"></div>
      <div class="skeleton rounded-xl aspect-[16/10]"></div>
      <div class="skeleton rounded-xl aspect-[16/10]"></div>
      <div class="skeleton rounded-xl aspect-[16/10]"></div>
      <div class="skeleton rounded-xl aspect-[16/10]"></div>
      <div class="skeleton rounded-xl aspect-[16/10]"></div>
    </div>

    <!-- Load More -->
    <div id="load-more-container" class="text-center hidden">
      <button id="load-more-btn" class="px-8 py-3 bg-white border border-gray-300 text-navy-700 font-semibold rounded-lg hover:bg-gray-50 hover:border-navy-300 transition-all">
        Load More Articles
      </button>
      <p id="load-more-info" class="text-xs text-navy-400 mt-2"></p>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="bg-navy-900 text-white">
    <div class="max-w-7xl mx-auto px-4 py-12">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
        <div>
          <div class="flex items-center gap-2 mb-4">
            <div class="w-9 h-9 bg-brand-500 rounded-lg flex items-center justify-center"><span class="text-white font-display font-black text-lg">E</span></div>
            <span class="font-display font-bold text-xl">TheEuroBrief</span>
          </div>
          <p class="text-navy-300 text-sm leading-relaxed">Your trusted source for European news covering politics, business, technology, culture, and more.</p>
        </div>
        <div>
          <h4 class="font-semibold text-sm uppercase tracking-wider text-navy-300 mb-4">Categories</h4>
          <div id="footer-categories" class="grid grid-cols-2 gap-2 text-sm"></div>
        </div>
        <div>
          <h4 class="font-semibold text-sm uppercase tracking-wider text-navy-300 mb-4">Company</h4>
          <div class="flex flex-col gap-2 text-sm">
            <a href="about.html" class="text-navy-200 hover:text-white transition-colors">About Us</a>
            <a href="about.html#contact" class="text-navy-200 hover:text-white transition-colors">Contact</a>
            <a href="about.html#privacy" class="text-navy-200 hover:text-white transition-colors">Privacy Policy</a>
          </div>
        </div>
      </div>
      <div class="border-t border-navy-700 mt-10 pt-6 flex flex-col sm:flex-row items-center justify-between gap-3 text-xs text-navy-400">
        <span>&copy; <span id="footer-year"></span> TheEuroBrief. All rights reserved.</span>
      </div>
    </div>
  </footer>

  <script>
  (function() {
    'use strict';

    const dateEl = document.getElementById('current-date');
    if (dateEl) dateEl.textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    document.getElementById('footer-year').textContent = new Date().getFullYear();

    const menuBtn = document.getElementById('mobile-menu-btn');
    const mobileMenu = document.getElementById('mobile-menu');
    if (menuBtn && mobileMenu) menuBtn.addEventListener('click', () => mobileMenu.classList.toggle('hidden'));

    const params = new URLSearchParams(window.location.search);
    let currentSlug = params.get('slug') || 'all';
    let currentPage = 0;
    const PAGE_SIZE = 9;
    let allLoaded = false;
    let currentCategoryId = null;

    async function loadNavCategories() {
      const { data } = await supabaseClient.from('categories').select('*').order('name');
      if (!data) return;
      const navContainer = document.getElementById('nav-categories');
      const mobileNavContainer = document.getElementById('mobile-nav-categories');
      const footerContainer = document.getElementById('footer-categories');
      if (navContainer) navContainer.innerHTML = `<a href="index.html" class="nav-link px-3 py-3 font-medium text-navy-600 hover:text-brand-500 whitespace-nowrap transition-colors">Home</a>` + data.map(c => `<a href="category.html?slug=${c.slug}" class="nav-link px-3 py-3 font-medium ${c.slug === currentSlug ? 'text-brand-500 font-semibold' : 'text-navy-600'} hover:text-brand-500 whitespace-nowrap transition-colors">${c.name}</a>`).join('');
      if (mobileNavContainer) mobileNavContainer.innerHTML = `<a href="index.html" class="px-3 py-2 rounded-lg font-medium text-navy-600 hover:bg-gray-100 transition-colors">Home</a>` + data.map(c => `<a href="category.html?slug=${c.slug}" class="px-3 py-2 rounded-lg font-medium ${c.slug === currentSlug ? 'text-brand-500 bg-brand-50' : 'text-navy-600'} hover:bg-gray-100 transition-colors">${c.name}</a>`).join('');
      if (footerContainer) footerContainer.innerHTML = data.map(c => `<a href="category.html?slug=${c.slug}" class="text-navy-200 hover:text-white transition-colors">${c.name}</a>`).join('');

      // Category tabs
      const tabsContainer = document.getElementById('category-tabs');
      if (tabsContainer) {
        const allTab = `<a href="category.html?slug=all" class="px-4 py-2 rounded-full text-sm font-semibold whitespace-nowrap transition-colors ${currentSlug === 'all' ? 'bg-brand-500 text-white' : 'bg-white text-navy-600 border border-gray-200 hover:border-brand-500 hover:text-brand-500'}">All News</a>`;
        const catTabs = data.map(c => `<a href="category.html?slug=${c.slug}" class="px-4 py-2 rounded-full text-sm font-semibold whitespace-nowrap transition-colors ${c.slug === currentSlug ? 'bg-brand-500 text-white' : 'bg-white text-navy-600 border border-gray-200 hover:border-brand-500 hover:text-brand-500'}">${c.name}</a>`).join('');
        tabsContainer.innerHTML = allTab + catTabs;
      }
    }

    async function loadCategoryHeader() {
      const headerContainer = document.getElementById('category-header');
      const breadcrumbCurrent = document.getElementById('breadcrumb-current');

      if (currentSlug === 'all') {
        headerContainer.innerHTML = `<h1 class="font-display font-black text-4xl text-navy-900">All News</h1><p class="text-navy-500 mt-1">Browse all articles from TheEuroBrief</p>`;
        breadcrumbCurrent.textContent = 'All News';
        document.title = 'All News — TheEuroBrief';
        document.querySelector('meta[name="description"]').setAttribute('content', 'Browse all European news articles from TheEuroBrief.');
        document.querySelector('meta[property="og:title"]').setAttribute('content', 'All News — TheEuroBrief');
        return;
      }

      const { data: cat } = await supabaseClient.from('categories').select('*').eq('slug', currentSlug).single();
      if (cat) {
        currentCategoryId = cat.id;
        headerContainer.innerHTML = `<h1 class="font-display font-black text-4xl text-navy-900">${cat.name}</h1><p class="text-navy-500 mt-1">${cat.description || ''}</p>`;
        breadcrumbCurrent.textContent = cat.name;
        document.title = `${cat.name} News — TheEuroBrief`;
        document.querySelector('meta[name="description"]').setAttribute('content', cat.description || `Latest ${cat.name} news from across Europe.`);
        document.querySelector('meta[property="og:title"]').setAttribute('content', `${cat.name} News — TheEuroBrief`);
        document.querySelector('meta[property="og:description"]').setAttribute('content', cat.description || '');
      }
    }

    function createCard(a) {
  const imgUrl = getImageUrl(a.featured_image);
  const catName = a.categories?.name || 'News';
  const catSlug = a.categories?.slug || 'all';

  // Simplified onerror
  const imageHTML = imgUrl
    ? `<img src="${imgUrl}" alt="${a.title}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" loading="lazy" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
        <div class="hidden w-full h-full flex items-center justify-center bg-gradient-to-br from-brand-50 to-brand-100">
          <span class="text-brand-200 text-4xl font-display font-black">${catName[0]}</span>
        </div>`
    : `<div class="w-full h-full flex items-center justify-center bg-gradient-to-br from-brand-50 to-brand-100"><span class="text-brand-200 text-4xl font-display font-black">${catName[0]}</span></div>`;
      return `
        <a href="article.html?slug=${a.slug}" class="group block bg-white rounded-xl overflow-hidden shadow-sm hover:shadow-lg border border-gray-100 hover:border-gray-200 transition-all duration-300">
          <div class="aspect-[16/10] overflow-hidden bg-gray-100">${imageHTML}</div>
          <div class="p-4">
            <a href="category.html?slug=${catSlug}" class="text-xs font-bold text-brand-500 uppercase tracking-wider hover:text-brand-700 transition-colors">${catName}</a>
            <h3 class="mt-1.5 font-display font-bold text-navy-900 group-hover:text-brand-600 transition-colors line-clamp-2 leading-snug">${a.title}</h3>
            <p class="mt-2 text-sm text-navy-500 line-clamp-3 leading-relaxed">${a.excerpt || ''}</p>
            <p class="mt-2 text-xs text-navy-400">${formatDateShort(a.published_at)}</p>
          </div>
        </a>`;
    }

    async function loadArticles(append) {
      const grid = document.getElementById('articles-grid');
      const loadMoreContainer = document.getElementById('load-more-container');
      const loadMoreBtn = document.getElementById('load-more-btn');

      if (!append) { grid.innerHTML = ''; currentPage = 0; allLoaded = false; }
      loadMoreBtn.textContent = 'Loading...';
      loadMoreBtn.disabled = true;

      let query = supabaseClient
        .from('articles')
        .select('*, categories(*)')
        .eq('is_published', true)
        .order('published_at', { ascending: false })
        .range(currentPage * PAGE_SIZE, (currentPage + 1) * PAGE_SIZE - 1);

      if (currentCategoryId) query = query.eq('category_id', currentCategoryId);

      const { data, error } = await query;

      if (error || !data || data.length === 0) {
        if (!append) {
          grid.innerHTML = `<div class="col-span-full text-center py-16"><div class="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-3"><svg class="w-8 h-8 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2m-4-3H9M7 16h6M7 8h6v4H7V8z"/></svg></div><p class="text-navy-400 font-display text-lg">No articles in this category yet</p></div>`;
        }
        allLoaded = true;
        loadMoreContainer.classList.add('hidden');
        return;
      }

      const html = data.map(a => createCard(a)).join('');
      if (append) { grid.insertAdjacentHTML('beforeend', html); } else { grid.innerHTML = html; }

      currentPage++;
      if (data.length < PAGE_SIZE) { allLoaded = true; loadMoreContainer.classList.add('hidden'); }
      else {
        loadMoreContainer.classList.remove('hidden');
        document.getElementById('load-more-info').textContent = `Showing ${currentPage * PAGE_SIZE} articles`;
        loadMoreBtn.textContent = 'Load More Articles';
        loadMoreBtn.disabled = false;
      }
    }

    document.getElementById('load-more-btn').addEventListener('click', () => loadArticles(true));

    async function init() {
      try {
        await loadCategoryHeader();
        await loadNavCategories();
        await loadArticles(false);
      } catch (err) { console.error('Error:', err); }
    }

    if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', init); } else { init(); }
  })();
  </script>
</body>
</html>
